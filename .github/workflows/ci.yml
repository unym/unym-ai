name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  # Sentry: silence CLI warnings in CI when no auth token is set
  SENTRY_DISABLE_AUTO_UPLOAD: "true"

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter=@unym/web db:generate

      - name: Lint
        run: pnpm turbo lint

      - name: Test
        run: pnpm turbo test

      - name: Build
        run: pnpm turbo build
        env:
          # Required to prevent next build from failing without a real DB
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
          SKIP_ENV_VALIDATION: "1"
